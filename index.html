*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'MadeTommy',sans-serif;background:#fff9da;color:#1a1a1a}
.hero{height:62vh;min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:3.5rem 2rem 2.5rem;background:#1a0e00;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:#f4b100;z-index:2}
.hero-orb{position:absolute;border-radius:50%;filter:blur(100px);pointer-events:none}
.orb1{width:520px;height:520px;background:rgba(244,177,0,0.28);top:-160px;left:-100px;animation:orbIn 1.6s ease-out forwards;opacity:0}
.orb2{width:380px;height:380px;background:rgba(60,38,0,0.7);bottom:-80px;right:-80px;animation:orbIn 2s .2s ease-out forwards;opacity:0}
.orb3{width:260px;height:260px;background:rgba(227,176,32,0.15);top:35%;left:55%;animation:orbIn 2.2s .4s ease-out forwards;opacity:0}
@keyframes orbIn{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
.hero-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;width:100%;text-align:center}
.logos{display:flex;justify-content:center;margin-bottom:1.4rem;animation:fadeUp .7s ease both}
.logo-pair{height:60px;object-fit:contain}
.hero-title{font-family:'BuiltTitling',sans-serif;font-size:clamp(70px,14vw,138px);font-weight:700;color:#f4b100;line-height:.9;letter-spacing:4px;text-transform:uppercase;margin-bottom:1.1rem;animation:fadeUp .7s .1s ease both;text-shadow:0 2px 30px rgba(244,177,0,0.25)}
.hero-chips{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;animation:fadeUp .7s .2s ease both}
.chip{font-family:'MadeTommy',sans-serif;font-size:11px;font-weight:500;padding:5px 14px;border-radius:20px;letter-spacing:.4px}
.chip.dark{background:#f4b100;color:#1a0e00;font-weight:700}
.chip.ol{background:transparent;color:#fff9da;border:1px solid rgba(255,249,218,0.35)}
.scroll-hint{margin-top:1.8rem;font-size:10px;color:#696666;font-family:'MadeTommy',sans-serif;display:flex;flex-direction:column;align-items:center;gap:6px;animation:fadeUp .7s .3s ease both;letter-spacing:1px;text-transform:uppercase}
.scroll-line{width:1px;height:0;background:#f4b100;opacity:.5;animation:lineGrow 1s 1s ease forwards}
@keyframes lineGrow{to{height:26px}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.sections{max-width:740px;margin:0 auto;padding:3rem 1.5rem 2rem}
.accordion{border-radius:14px;overflow:hidden;margin-bottom:10px;scroll-margin-top:20px;border-width:1px;border-style:solid}
.acc-header{display:flex;align-items:center;gap:14px;padding:1rem 1.2rem;cursor:pointer;user-select:none;transition:filter 0.15s}
.acc-header:hover{filter:brightness(.97)}
.acc-num{width:32px;height:32px;border-radius:50%;font-size:14px;font-weight:700;font-family:'BuiltTitling',sans-serif;letter-spacing:1px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.acc-info{flex:1}
.acc-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;font-family:'MadeTommy',sans-serif}
.acc-title{font-size:15px;font-weight:400;color:#1a1a1a;margin-top:2px;font-family:'MadeTommy',sans-serif}
.acc-arrow{font-size:20px;transition:transform 0.25s;flex-shrink:0;line-height:1;color:#ccc}
.acc-arrow.open{transform:rotate(180deg)}
.acc-body{max-height:0;overflow:hidden;transition:max-height 0.4s ease}
.acc-body.open{max-height:4000px}
.acc-inner{padding:0 1.2rem 1.2rem}
.smeta{font-size:13px;color:#555;line-height:1.7;margin-bottom:2px;padding-top:.75rem;font-family:'MadeTommy',sans-serif}
.smeta strong{color:#1a1a1a;font-weight:700}
.scenes{display:flex;flex-direction:column;gap:7px;margin-top:.9rem}
.scene{border-radius:10px;padding:.85rem 1.1rem;display:flex;gap:13px;border-width:1px;border-style:solid}
.cnum{width:26px;height:26px;border-radius:50%;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;font-family:'BuiltTitling',sans-serif}
.cname{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;font-family:'MadeTommy',sans-serif}
.cdesc{font-size:13px;color:#333;line-height:1.7;font-family:'MadeTommy',sans-serif}
.ctxt{margin-top:7px;font-size:12px;padding:4px 10px;border-radius:6px;display:inline-block;font-family:'MadeTommy',sans-serif;font-weight:500}
.csfx{margin-top:5px;font-size:12px;padding:3px 9px;border-radius:6px;display:inline-block;font-family:'MadeTommy',sans-serif;background:#e8f4e8;color:#2d6a2d}
.needs-section{max-width:740px;margin:0 auto;padding:0 1.5rem 6rem}
.needs-title{font-family:'BuiltTitling',sans-serif;font-size:22px;font-weight:700;color:#1a0e00;letter-spacing:2px;text-transform:uppercase;margin-bottom:1rem;padding-top:1rem;border-top:2px solid #f4b100}
.needs-accordion{border-radius:14px;overflow:hidden;margin-bottom:8px;border:1px solid #e8d8a0;background:#fff}
.needs-header{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.2rem;cursor:pointer;user-select:none}
.needs-header:hover{background:#fffbf0}
.needs-label{font-size:13px;font-weight:700;color:#3c2600;font-family:'MadeTommy',sans-serif}
.needs-arrow{font-size:18px;color:#ccc;transition:transform 0.25s}
.needs-arrow.open{transform:rotate(180deg);color:#f4b100}
.needs-body{max-height:0;overflow:hidden;transition:max-height 0.35s ease}
.needs-body.open{max-height:800px}
.needs-inner{padding:.75rem 1.2rem 1rem;border-top:1px solid #f5efd8}
.needs-list{list-style:none;display:flex;flex-direction:column;gap:6px}
.needs-list li{font-size:13px;color:#333;font-family:'MadeTommy',sans-serif;display:flex;align-items:center;gap:8px;line-height:1.5}
.needs-list li::before{content:'';width:6px;height:6px;border-radius:50%;background:#f4b100;flex-shrink:0}
.footer{text-align:center;padding:2rem;font-size:11px;color:#946f59;font-family:'MadeTommy',sans-serif;letter-spacing:.8px;text-transform:uppercase}
</style>
</head>
